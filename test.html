<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaultix — Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
    }

    .card {
      width: 100%;
      max-width: 420px;
      margin: 20px;
      padding: 50px 40px 44px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      text-align: center;
      opacity: 0;
      transform: translateY(16px);
      animation: mount 0.5s ease 0.1s forwards;
    }
    @keyframes mount { to { opacity:1; transform:translateY(0); } }

    .logo { margin-bottom: 28px; }
    .logo-text {
      font-size: 36px; font-weight: 700;
      color: #1a1a2e; letter-spacing: -0.5px;
    }
    .logo-text span { color: #00c853; font-weight: 700; }

    .welcome {
      font-size: 26px; font-weight: 700;
      color: #1a1a2e; margin-bottom: 8px;
    }
    .subtitle {
      font-size: 15px; color: #8e8e93;
      margin-bottom: 36px;
    }

    /* Test mode badge */
    .test-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: #ea580c;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .test-badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ea580c;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* Input */
    .input-field {
      width: 100%; height: 54px;
      padding: 0 18px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; color: #1a1a2e;
      background: #ffffff; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .input-field::placeholder { color: #b0b0b8; }
    .input-field:focus {
      border-color: #00c853;
      box-shadow: 0 0 0 3px rgba(0,200,83,0.1);
    }
    .input-field.err { border-color: #ef4444; }
    .input-field.err:focus { box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }

    /* Error */
    .error-msg {
      display: none; align-items: center; gap: 6px;
      margin-top: 8px; font-size: 13px; color: #ef4444;
      text-align: left;
      animation: fadeIn 0.2s ease;
    }
    .error-msg.show { display: flex; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    /* Button */
    .continue-btn {
      width: 100%; height: 54px; margin-top: 32px;
      background: #00c853; border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 16px; font-weight: 600;
      color: #ffffff; cursor: pointer;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    .continue-btn:hover {
      background: #00a846;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,200,83,0.3);
    }
    .continue-btn:active { transform: translateY(0); }
    .continue-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Toast */
    .toast {
      display: none; align-items: center; gap: 10px;
      padding: 14px 18px; margin-bottom: 20px;
      background: #e8f5e9; border: 1px solid #a5d6a7;
      border-radius: 12px; text-align: left;
    }
    .toast.show { display: flex; animation: popIn 0.35s ease; }
    @keyframes popIn { 0%{opacity:0;transform:scale(.95);} 100%{opacity:1;transform:scale(1);} }
    .toast span { color: #2e7d32; font-size: 14px; font-weight: 500; }

    .toast.error { background: #fef2f2; border-color: #fca5a5; }
    .toast.error span { color: #dc2626; }

    .switch-text {
      margin-top: 28px; font-size: 14px; color: #8e8e93;
    }
    .switch-text a { color: #00c853; text-decoration: none; font-weight: 600; }
    .switch-text a:hover { text-decoration: underline; }

    /* Test numbers info box */
    .test-info {
      margin-top: 28px;
      padding: 16px 20px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      text-align: left;
    }
    .test-info-title {
      font-size: 12px; font-weight: 700;
      color: #475569; letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .test-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13.5px;
    }
    .test-number .num {
      font-family: 'Courier New', monospace;
      font-weight: 600;
      color: #1a1a2e;
      font-size: 14px;
    }
    .test-number .status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .status-valid {
      background: #dcfce7; color: #16a34a;
    }
    .status-invalid {
      background: #fef2f2; color: #dc2626;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <span class="logo-text">
        vaultix<span><svg style="display:inline-block;position:relative;top:-6px;left:-2px;" width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 4L6 14h12L12 4z" fill="#00c853"/>
          <path d="M12 0L8 8h8L12 0z" fill="#00e676" opacity="0.7"/>
        </svg></span>
      </span>
    </div>

    <!-- Header -->
    <h1 class="welcome">Welcome</h1>
    <p class="subtitle">Login to Vaultix</p>

    <!-- Test mode badge -->
    <div class="test-badge"><span class="dot"></span> TEST MODE</div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="#2e7d32" stroke-width="2"/><path d="M7 12.5l3 3 7-7" stroke="#2e7d32" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span id="toastMsg"></span>
    </div>

    <!-- Phone Input -->
    <input type="tel" class="input-field" id="phoneInput" placeholder="Mobile Number" maxlength="15" />
    <div class="error-msg" id="phoneError">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="#ef4444" stroke-width="1.5"/><path d="M7 4.5V7.5M7 9.5v0" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="phoneErrorMsg"></span>
    </div>

    <!-- Button -->
    <button class="continue-btn" id="submitBtn">Continue</button>

    <!-- Switch -->
    <div class="switch-text">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>

    <!-- Test Numbers Reference -->
    <div class="test-info">
      <div class="test-info-title">Test Numbers</div>
      <div class="test-number">
        <span class="num">9876543210</span>
        <span class="status status-valid">✓ Valid</span>
      </div>
      <div class="test-number">
        <span class="num">8765432109</span>
        <span class="status status-valid">✓ Valid</span>
      </div>
      <div class="test-number">
        <span class="num">7654321098</span>
        <span class="status status-valid">✓ Valid</span>
      </div>
      <div class="test-number">
        <span class="num">1234567890</span>
        <span class="status status-invalid">✗ Invalid</span>
      </div>
    </div>

  </div>

<script>
(function(){

  // ═══════════════════════════════════════
  // 🧪 TEST MODE CONFIG
  // ═══════════════════════════════════════

  // Valid test numbers (simulates your DB)
  const VALID_NUMBERS = [
    "9876543210",
    "8765432109",
    "7654321098",
  ];

  // Where to redirect on success
  const REDIRECT_URL = "https://www.meradhan.co/partners-and-distributors";

  // ═══════════════════════════════════════

  const phoneInput = document.getElementById("phoneInput");
  const errWrap = document.getElementById("phoneError");
  const errMsg = document.getElementById("phoneErrorMsg");
  const submitBtn = document.getElementById("submitBtn");
  const toast = document.getElementById("toast");
  const toastMsg = document.getElementById("toastMsg");

  // Only allow digits
  phoneInput.addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").slice(0, 15);
  });

  function validate(v) {
    const d = v.replace(/\D/g, "");
    if (!d) return "Mobile number is required";
    if (d.length < 7) return "Mobile number is too short";
    if (d.length > 15) return "Mobile number is too long";
    return "";
  }

  function showErr(msg) {
    errMsg.textContent = msg;
    errWrap.classList.add("show");
    phoneInput.classList.add("err");
  }

  function hideErr() {
    errWrap.classList.remove("show");
    phoneInput.classList.remove("err");
  }

  function showToast(msg, isError) {
    toast.classList.remove("show", "error");
    toastMsg.textContent = msg;
    if (isError) toast.classList.add("error");
    toast.classList.add("show");
    if (isError) setTimeout(() => toast.classList.remove("show", "error"), 4000);
  }

  phoneInput.addEventListener("focus", hideErr);

  submitBtn.addEventListener("click", function() {
    const err = validate(phoneInput.value);
    if (err) { showErr(err); return; }
    hideErr();

    const phone = phoneInput.value.trim();

    // Disable button
    submitBtn.disabled = true;
    submitBtn.textContent = "Checking...";

    // Simulate API call delay (500ms)
    setTimeout(() => {

      if (VALID_NUMBERS.includes(phone)) {

        // ✅ Number is VALID → Show success → Redirect
        showToast("✓ Number verified! Redirecting...", false);

        setTimeout(() => {
          window.location.href = REDIRECT_URL;
        }, 500);

      } else {

        // ❌ Number is INVALID
        showToast("This number is not registered. Please sign up first.", true);
        submitBtn.disabled = false;
        submitBtn.textContent = "Continue";

      }

    }, 500);
  });

  phoneInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") submitBtn.click();
  });

})();
</script>
</body>
</html>
